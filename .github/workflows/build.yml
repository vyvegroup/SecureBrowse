name: Build & Sign Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Setup Gradle Wrapper
        run: |
          mkdir -p gradle/wrapper
          curl -sL "https://services.gradle.org/distributions/gradle-8.5-bin.zip" -o /tmp/gradle.zip
          unzip -qo /tmp/gradle.zip -d /tmp/gradle-install
          /tmp/gradle-install/gradle-8.5/bin/gradle wrapper --gradle-version 8.5
          chmod +x gradlew

      - name: Generate Signing Keystore
        run: |
          keytool -genkeypair \
            -v \
            -keystore release.jks \
            -alias securebrowse \
            -keyalg RSA \
            -keysize 4096 \
            -sigalg SHA256withRSA \
            -validity 36500 \
            -storepass "securebrowse2024" \
            -keypass "securebrowse2024" \
            -dname "CN=SecureBrowse, OU=Dev, O=SecureBrowse, L=Unknown, ST=Unknown, C=US"

      - name: Build Release APK (Signed v1+v2+v3)
        env:
          KEYSTORE_FILE: release.jks
          KEYSTORE_PASSWORD: "securebrowse2024"
          KEY_ALIAS: "securebrowse"
          KEY_PASSWORD: "securebrowse2024"
        run: ./gradlew assembleRelease --no-daemon

      - name: Verify APK Signature Schemes
        run: |
          APK_PATH=$(find app/build -name "*.apk" -type f | head -1)
          echo "APK: $APK_PATH"
          echo "APK size: $(du -h $APK_PATH | cut -f1)"
          echo ""
          echo "=== Signature Verification ==="
          $ANDROID_HOME/build-tools/$(ls $ANDROID_HOME/build-tools/ | tail -1)/apksigner verify --print-certs "$APK_PATH" || echo "apksigner verify failed (may need different tooling)"
          echo ""
          echo "=== Checking META-INF ==="
          unzip -l "$APK_PATH" | rg "META-INF" || echo "No META-INF entries"

      - name: Prepare & Upload Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          APK_PATH=$(find app/build -name "*.apk" -type f | head -1)
          echo "Found APK: $APK_PATH"
          VERSION="2.0.0"
          TIMESTAMP=$(date +%Y%m%d-%H%M%S)
          TAG="v${VERSION}-${TIMESTAMP}"
          APK_NAME="SecureBrowse-${VERSION}-${TIMESTAMP}.apk"
          cp "$APK_PATH" "/tmp/${APK_NAME}"
          echo "APK_NAME=${APK_NAME}" >> $GITHUB_ENV
          echo "TAG=${TAG}" >> $GITHUB_ENV
          echo "VERSION=${VERSION}" >> $GITHUB_ENV

          # Create git tag
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "$TAG" 2>/dev/null || true
          git push origin "$TAG" 2>/dev/null || true

          # Create release via gh CLI
          gh release create "$TAG" "/tmp/${APK_NAME}" \
            --title "SecureBrowse v${VERSION} - ${TIMESTAMP}" \
            --notes "## SecureBrowse v${VERSION}

          ### Network-Level Content Blocker
          Blocks \`roblox.com\` and 24+ related domains via **local VPN DNS interception**.

          ### How it works
          - Creates a local VPN that intercepts all DNS queries
          - Blocks any DNS lookup for \`*.roblox.com\`, \`*.rbxcdn.com\`, and related domains
          - Returns NXDOMAIN to the requesting app
          - **Works for ALL apps**: Chrome, Firefox, WebViews, fetch(), XMLHttpRequest, etc.

          ### Signing
          - ✅ APK Signature Scheme v1 (JAR signing)
          - ✅ APK Signature Scheme v2
          - ✅ APK Signature Scheme v3 (key rotation ready)

          ### Requirements
          - Android 8.0+ (API 26)

          ### Installation
          1. Download APK below
          2. Enable \"Install from unknown sources\"
          3. Install & open
          4. Tap \"Start Blocking\" → Accept VPN permission
          5. roblox.com is now blocked system-wide"
