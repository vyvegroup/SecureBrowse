name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Generate Gradle Wrapper
        run: |
          gradle wrapper --gradle-version 8.5
          chmod +x gradlew

      - name: Build Release APK
        run: ./gradlew assembleRelease --no-daemon

      - name: Get version info
        id: version
        run: |
          VERSION=$(grep "versionName" app/build.gradle.kts | sed 's/.*"\(.*\)".*/\1/')
          CODE=$(grep "versionCode" app/build.gradle.kts | sed 's/.*\([0-9]\+\).*/\1/')
          TIMESTAMP=$(date +%Y%m%d-%H%M%S)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "code=$CODE" >> $GITHUB_OUTPUT
          echo "timestamp=$TIMESTAMP" >> $GITHUB_OUTPUT
          echo "tag=v${VERSION}-${TIMESTAMP}" >> $GITHUB_OUTPUT

      - name: Find and Rename APK
        run: |
          echo "=== Listing APK outputs ==="
          find app/build/outputs -name "*.apk" -type f 2>/dev/null || echo "No APK in outputs"
          APK_PATH=$(find app/build -name "*.apk" -type f | head -1)
          if [ -z "$APK_PATH" ]; then
            echo "ERROR: No APK found!"
            find app/build -type f -name "*.apk" 2>/dev/null
            ls -la app/build/outputs/apk/release/ 2>/dev/null || echo "release dir not found"
            exit 1
          fi
          echo "Found APK at: $APK_PATH"
          mkdir -p /tmp/apk-output
          cp "$APK_PATH" "/tmp/apk-output/SecureBrowse-${{ steps.version.outputs.version }}-${{ steps.version.outputs.timestamp }}.apk"
          echo "APK_FILE=/tmp/apk-output/SecureBrowse-${{ steps.version.outputs.version }}-${{ steps.version.outputs.timestamp }}.apk" >> $GITHUB_ENV

      - name: Create Release and Upload APK
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "SecureBrowse v${{ steps.version.outputs.version }} - ${{ steps.version.outputs.timestamp }}"
          body: |
            ## SecureBrowse Android App
            **Version:** ${{ steps.version.outputs.version }}
            **Build:** ${{ steps.version.outputs.timestamp }}

            ### Features
            - Material 3+ Design
            - Glassmorphism UI with gradient effects
            - Content restriction enforcement
            - Android 8.0+ (API 26+) support

            ### Installation
            1. Download the APK file below
            2. Enable "Install from unknown sources" on your device
            3. Install the APK

          files: ${{ env.APK_FILE }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
